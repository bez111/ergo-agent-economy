name: CI MCP

on:
  push:
    branches: [main]
    paths:
      - "packages/ergo-agent-mcp/**"
      - "packages/ergo-agent-pay/**"
      - "packages/ergo-agent-api/**"
      - "test-vectors/**"
      - ".github/workflows/ci-mcp.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "packages/ergo-agent-mcp/**"
      - "packages/ergo-agent-pay/**"
      - "packages/ergo-agent-api/**"
      - "test-vectors/**"
      - ".github/workflows/ci-mcp.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  build:
    name: Build, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace
        run: npm install

      - name: Build ergo-agent-pay (MCP depends on its dist)
        run: npm run build -w ergo-agent-pay

      - name: Build ergo-agent-api (MCP depends on its dist)
        run: npm run build -w ergo-agent-api

      - name: Typecheck MCP
        run: npm run typecheck -w ergo-agent-mcp

      - name: Test MCP
        run: npm test -w ergo-agent-mcp

      - name: Build MCP
        run: npm run build -w ergo-agent-mcp
