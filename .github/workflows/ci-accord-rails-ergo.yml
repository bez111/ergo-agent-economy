name: CI Accord Rails Ergo

on:
  push:
    branches: [main]
    paths:
      - "packages/accord-rails-ergo/**"
      - "packages/accord-rails/**"
      - "packages/accord-core/**"
      - ".github/workflows/ci-accord-rails-ergo.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "packages/accord-rails-ergo/**"
      - "packages/accord-rails/**"
      - "packages/accord-core/**"
      - ".github/workflows/ci-accord-rails-ergo.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  build:
    name: Build, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace
        run: npm install --include=optional

      - name: Build accord-core (rails-ergo depends on its dist)
        run: npm run build -w @accord-protocol/core

      - name: Build accord-rails (rails-ergo depends on its dist)
        run: npm run build -w @accord-protocol/rails

      - name: Typecheck
        run: npm run typecheck -w @accord-protocol/rails-ergo

      - name: Test
        run: npm test -w @accord-protocol/rails-ergo

      - name: Build
        run: npm run build -w @accord-protocol/rails-ergo
