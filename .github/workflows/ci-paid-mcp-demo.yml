name: CI Paid-MCP Demo

on:
  push:
    branches: [main]
    paths:
      - "examples/15-paid-mcp-repo-audit/**"
      - "examples/16-paid-mcp-ergo-testnet/**"
      - "packages/accord-core/**"
      - "packages/accord-mcp/**"
      - "packages/accord-rails/**"
      - "packages/accord-rails-ergo/**"
      - "packages/ergo-agent-pay/**"
      - ".github/workflows/ci-paid-mcp-demo.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "examples/15-paid-mcp-repo-audit/**"
      - "examples/16-paid-mcp-ergo-testnet/**"
      - "packages/accord-core/**"
      - "packages/accord-mcp/**"
      - "packages/accord-rails/**"
      - "packages/accord-rails-ergo/**"
      - "packages/ergo-agent-pay/**"
      - ".github/workflows/ci-paid-mcp-demo.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  build:
    name: Run end-to-end demo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace
        run: npm install --include=optional

      - name: Build demo dependencies
        run: |
          npm run build -w @accord-protocol/core
          npm run build -w @accord-protocol/mcp
          npm run build -w @accord-protocol/rails
          npm run build -w @accord-protocol/rails-ergo
          npm run build -w ergo-agent-pay

      - name: Test mock paid-MCP demo
        run: npm test -w accord-paid-mcp-repo-audit-demo

      - name: Test Ergo testnet paid-MCP demo shape
        run: |
          npm run typecheck -w accord-paid-mcp-ergo-testnet-demo
          npm test -w accord-paid-mcp-ergo-testnet-demo

      # Run the actual mock end-to-end driver. Fails CI if the lifecycle breaks.
      - name: Run mock demo CLI
        run: npm run dev -w accord-paid-mcp-repo-audit-demo
