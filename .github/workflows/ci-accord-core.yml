name: CI Accord Core

on:
  push:
    branches: [main]
    paths:
      - "packages/accord-core/**"
      - ".github/workflows/ci-accord-core.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "packages/accord-core/**"
      - ".github/workflows/ci-accord-core.yml"
      - "package.json"
      - "package-lock.json"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace
        run: npm install

      - name: Typecheck
        run: npm run typecheck -w @accord-protocol/core

      - name: Test
        run: npm test -w @accord-protocol/core

      - name: Build
        run: npm run build -w @accord-protocol/core

      - name: Check test-vector fixtures (no drift)
        # Re-derives canonical bytes + hash for every test-vectors/**/v0/<name>.json
        # and fails if the pinned .canonical.txt / .hash.txt files differ. This is
        # the cross-language conformance gate: a Python/Go/Rust implementation
        # must reproduce the same canonical bytes + accord_hash_v0 byte-for-byte.
        run: node scripts/derive-fixture-hashes.mjs --check
