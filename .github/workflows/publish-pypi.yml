name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-python:
    name: Publish ergo-agent-pay (Python) to PyPI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/ergo-agent-py

    permissions:
      id-token: write  # required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Check dist
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure at: https://pypi.org/manage/account/publishing/
        # Publisher: accord-protocol/accord-protocol, workflow: publish-pypi.yml
        # `packages-dir` is required because the action runs in a Docker
        # container that ignores the job-level `defaults.run.working-directory`.
        with:
          packages-dir: packages/ergo-agent-py/dist
