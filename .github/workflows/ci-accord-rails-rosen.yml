name: CI Accord Rails Rosen

on:
  push:
    branches: [main]
    paths:
      - "packages/accord-rails-rosen/**"
      - "packages/accord-rails/**"
      - "packages/accord-core/**"
      - ".github/workflows/ci-accord-rails-rosen.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [main]
    paths:
      - "packages/accord-rails-rosen/**"
      - "packages/accord-rails/**"
      - "packages/accord-core/**"
      - ".github/workflows/ci-accord-rails-rosen.yml"
      - "package.json"
      - "package-lock.json"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace
        run: npm install --include=optional

      - name: Build accord-core
        run: npm run build -w @accord-protocol/core

      - name: Build accord-rails
        run: npm run build -w @accord-protocol/rails

      - name: Typecheck
        run: npm run typecheck -w @accord-protocol/rails-rosen

      - name: Test
        run: npm test -w @accord-protocol/rails-rosen

      - name: Build
        run: npm run build -w @accord-protocol/rails-rosen
