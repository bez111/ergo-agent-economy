          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build
        run: |
          npm run build -w @accord-protocol/core
          npm run build -w @accord-protocol/rails
          npm run build -w @accord-protocol/rails-base
      - name: Test
        run: npm test -w @accord-protocol/rails-base
      - name: Publish if new
        run: |
          LOCAL=$(node -p "require('./packages/accord-rails-base/package.json').version")
          if npm view "@accord-protocol/rails-base@$LOCAL" version >/dev/null 2>&1; then
            echo "@accord-protocol/rails-base@$LOCAL already on npm; skipping."
          else
            npm publish --workspace @accord-protocol/rails-base --access public
          fi
        env:
