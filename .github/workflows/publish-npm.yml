          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Accord Protocol layer: rail adapters ────────────────────────────────────

  accord-rails-ergo:
    name: "@accord-protocol/rails-ergo"
    needs: [accord-rails]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build
        run: |
          npm run build -w @accord-protocol/core
          npm run build -w @accord-protocol/rails
          npm run build -w @accord-protocol/rails-ergo
      - name: Test
        run: npm test -w @accord-protocol/rails-ergo
      - name: Publish if new
