  accord-rails-x402:
    name: "@accord-protocol/rails-x402"
    needs: [accord-rails]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build
        run: |
          npm run build -w @accord-protocol/core
          npm run build -w @accord-protocol/rails
          npm run build -w @accord-protocol/rails-x402
      - name: Test
        run: npm test -w @accord-protocol/rails-x402
      - name: Publish if new
        run: |
          LOCAL=$(node -p "require('./packages/accord-rails-x402/package.json').version")
          if npm view "@accord-protocol/rails-x402@$LOCAL" version >/dev/null 2>&1; then
            echo "@accord-protocol/rails-x402@$LOCAL already on npm; skipping."
          else
            npm publish --workspace @accord-protocol/rails-x402 --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Accord Protocol layer: top (depends on everything) ──────────────────────

  accord-conformance:
    name: "@accord-protocol/conformance"
    needs:
      - ergo-agent-pay
      - ergo-agent-scripts
      - agentpay-base
      - accord-core
      - accord-rails
      - accord-mcp
      - accord-gateway
      - accord-rails-ergo
      - accord-rails-rosen
      - accord-rails-base
      - accord-rails-x402
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build deps
        run: |
          npm run build -w @accord-protocol/core
          npm run build -w @accord-protocol/rails
          npm run build -w @accord-protocol/mcp
          npm run build -w @accord-protocol/gateway
          npm run build -w @accord-protocol/rails-ergo
          npm run build -w @accord-protocol/rails-rosen
          npm run build -w @accord-protocol/rails-base
          npm run build -w @accord-protocol/rails-x402
          npm run build -w ergo-agent-pay
          npm run build -w ergo-agent-scripts
          npm run build -w agentpay-base
      - name: Build
        run: npm run build -w @accord-protocol/conformance
      - name: Test
        run: npm test -w @accord-protocol/conformance
      - name: Self-conformance gate (L0+L1+L2+L3+L4)
        run: node packages/accord-conformance/dist/cli.js run --levels L0,L1,L2,L3,L4
      - name: Publish if new
        run: |
          LOCAL=$(node -p "require('./packages/accord-conformance/package.json').version")
          if npm view "@accord-protocol/conformance@$LOCAL" version >/dev/null 2>&1; then
            echo "@accord-protocol/conformance@$LOCAL already on npm; skipping."
          else
            npm publish --workspace @accord-protocol/conformance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Accord Protocol layer: buyer-side policy enforcer ─────────────────────

  accord-buyer-policy:
    name: "@accord-protocol/buyer-policy"
    needs:
      - accord-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build deps
