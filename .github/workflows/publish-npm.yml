            echo "@accord-protocol/rails-ergo@$LOCAL already on npm; skipping."
          else
            npm publish --workspace @accord-protocol/rails-ergo --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  accord-rails-rosen:
    name: "@accord-protocol/rails-rosen"
    needs: [accord-rails]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build
        run: |
          npm run build -w @accord-protocol/core
          npm run build -w @accord-protocol/rails
          npm run build -w @accord-protocol/rails-rosen
      - name: Test
        run: npm test -w @accord-protocol/rails-rosen
      - name: Publish if new
        run: |
          LOCAL=$(node -p "require('./packages/accord-rails-rosen/package.json').version")
          if npm view "@accord-protocol/rails-rosen@$LOCAL" version >/dev/null 2>&1; then
