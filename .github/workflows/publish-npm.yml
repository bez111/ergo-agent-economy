      - name: Install
        run: npm install --include=optional
      - name: Build deps
        run: |
          npm run build -w ergo-agent-pay
          npm run build -w ergo-agent-api
      - name: Build
        run: npm run build -w ergo-agent-mcp
      - name: Test
        run: npm test -w ergo-agent-mcp
      - name: Publish if new
        run: |
          LOCAL=$(node -p "require('./packages/ergo-agent-mcp/package.json').version")
          if npm view "ergo-agent-mcp@$LOCAL" version >/dev/null 2>&1; then
            echo "ergo-agent-mcp@$LOCAL already on npm; skipping."
          else
            npm publish --workspace ergo-agent-mcp --access public
