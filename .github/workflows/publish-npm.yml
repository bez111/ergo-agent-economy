  ergo-agent-rosen:
    name: ergo-agent-rosen
    needs: [ergo-agent-pay, ergo-agent-scripts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
