        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  ergo-agent-server:
    name: ergo-agent-server
    needs: [ergo-agent-pay]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
