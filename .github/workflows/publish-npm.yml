name: Publish to npm

on:
  push:
    tags:
      - "v*"          # triggers on: git tag v0.4.0 && git push --tags
  workflow_dispatch:  # manual re-run from Actions UI (used to verify green CI after fixes)

# Two scopes published by this workflow:
#
#   Legacy `ergo-agent-*` / `agentpay-base` packages (currently at 0.3.0).
#   Re-publishing the same version is a no-op via the skip-if-already-published
#   guard at the top of each job, so an accidental v0.3.x tag is safe.
#
#   New `@accord-protocol/*` scoped packages (at 0.4.0). These are the
#   open-standard layer added during the rebrand.
#
# Topological ordering:
#   1. Foundation:  ergo-agent-pay, ergo-agent-scripts, agentpay-base
#                   @accord-protocol/core
#   2. Mid:         ergo-agent-cli/api/mcp/server (depend on pay)
#                   ergo-agent-rosen (depends on pay + scripts)
#                   @accord-protocol/{rails,mcp,gateway,buyer-policy}
#                   (depend on core)
#   3. Rail mid:    @accord-protocol/rails-{ergo,rosen,base,x402}
#                   (depend on core + rails)
#   4. Top:         @accord-protocol/conformance
#                   (depends on Accord rails and legacy foundation packages)
#
# `needs:` enforces the order so a foundation failure aborts dependents.

env:
  NODE_VERSION: "20"

jobs:
  # ── Legacy: foundation ──────────────────────────────────────────────────────

  ergo-agent-pay:
    name: ergo-agent-pay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build
        run: npm run build -w ergo-agent-pay
      - name: Test
        run: npm test -w ergo-agent-pay
      - name: Publish if new
        run: |
          LOCAL=$(node -p "require('./packages/ergo-agent-pay/package.json').version")
          if npm view "ergo-agent-pay@$LOCAL" version >/dev/null 2>&1; then
            echo "ergo-agent-pay@$LOCAL already on npm; skipping."
          else
            npm publish --workspace ergo-agent-pay --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  ergo-agent-scripts:
    name: ergo-agent-scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build
        run: npm run build -w ergo-agent-scripts
      - name: Test
        run: npm test -w ergo-agent-scripts
      - name: Verify registry hashes
        run: npm run verify-predicates -w ergo-agent-scripts
      - name: Publish if new
        run: |
          LOCAL=$(node -p "require('./packages/ergo-agent-scripts/package.json').version")
          if npm view "ergo-agent-scripts@$LOCAL" version >/dev/null 2>&1; then
            echo "ergo-agent-scripts@$LOCAL already on npm; skipping."
          else
            npm publish --workspace ergo-agent-scripts --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  agentpay-base:
    name: agentpay-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - name: Install
        run: npm install --include=optional
      - name: Build
        run: npm run build -w agentpay-base
      - name: Test
