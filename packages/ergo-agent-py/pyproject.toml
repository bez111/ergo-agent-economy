[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "ergo-agent-pay"
version = "0.2.0"
description = "SDK for autonomous AI agents to hold, move, and pay on the Ergo blockchain"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = [
  "ergo", "blockchain", "agent", "ai-agent", "payments", "autonomous",
  "langchain", "openai", "eUTXO", "acceptance-predicate", "note",
  "agent-economy", "bearer-instrument"
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
  "Topic :: Office/Business :: Financial",
]
dependencies = []  # zero required dependencies — uses stdlib only

[project.optional-dependencies]
langchain = ["langchain>=0.1.0", "pydantic>=2.0"]
openai = ["openai>=1.0.0"]
all = ["langchain>=0.1.0", "pydantic>=2.0", "openai>=1.0.0"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "mypy>=1.0", "ruff>=0.1"]

[project.urls]
Homepage = "https://github.com/bez111/ergo-agent-economy"
Documentation = "https://github.com/bez111/ergo-agent-economy/blob/main/docs/api-reference.md"
Repository = "https://github.com/bez111/ergo-agent-economy"
Issues = "https://github.com/bez111/ergo-agent-economy/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["ergo_agent_pay*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
strict = true
